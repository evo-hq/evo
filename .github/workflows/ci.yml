name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assert CLI and plugin manifest versions match
        run: python3 scripts/check_versions.py
